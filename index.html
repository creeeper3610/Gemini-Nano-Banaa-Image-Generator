<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Gemini 画像生成</title>
<style>
    body {
        margin: 0;
        background: #111;
        color: #eee;
        font-family: system-ui, sans-serif;
    }
    header {
        background: #181818;
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #333;
    }
    header h1 {
        margin: 0;
        font-size: 18px;
    }
    button {
        cursor: pointer;
    }
    #settings-btn {
        background: #333;
        color: #eee;
        border: none;
        padding: 6px 12px;
        border-radius: 4px;
    }
    #settings-btn:hover {
        background: #444;
    }

    main {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
    }

    textarea, select, input[type="number"] {
        width: 100%;
        padding: 8px;
        background: #1b1b1b;
        border: 1px solid #444;
        border-radius: 4px;
        color: #eee;
        font-size: 14px;
    }

    #controls {
        margin-top: 12px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
    }

    #generate-btn {
        background: #4f46e5;
        color: #fff;
        border: none;
        padding: 10px 18px;
        border-radius: 4px;
        font-size: 14px;
    }
    #generate-btn:disabled {
        background: #333;
        cursor: not-allowed;
    }

    #gallery {
        margin-top: 24px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px;
    }

    .image-card {
        background: #181818;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #333;
    }
    .image-card img {
        width: 100%;
        border-radius: 4px;
    }
    .image-card button {
        margin-top: 8px;
        width: 100%;
        padding: 6px;
        background: #333;
        color: #eee;
        border: none;
        border-radius: 4px;
    }
    .image-card button:hover {
        background: #444;
    }

    /* モーダル */
    #settings-modal {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }
    #settings-modal .modal-content {
        background: #181818;
        padding: 20px;
        width: 320px;
        border-radius: 8px;
        border: 1px solid #333;
    }
    #settings-modal h2 {
        margin-top: 0;
        font-size: 16px;
    }
    #settings-modal input {
        width: 100%;
        padding: 8px;
        background: #1b1b1b;
        border: 1px solid #444;
        border-radius: 4px;
        color: #eee;
        margin-bottom: 12px;
    }
    #settings-modal .footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
    }
    #toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #333;
        padding: 12px 20px;
        border-radius: 6px;
        color: #eee;
        display: none;
    }
</style>
</head>
<body>

<header>
    <h1>Gemini 画像生成</h1>
    <button id="settings-btn">設定</button>
</header>

<main>
    <label>プロンプト</label>
    <textarea id="prompt" placeholder="生成したい画像の説明を書いてください"></textarea>

    <div id="controls">
        <div style="flex:1;">
            <label>サイズ</label>
            <select id="size">
                <option value="512x512">512×512</option>
                <option value="768x768">768×768</option>
                <option value="1024x1024" selected>1024×1024</option>
            </select>
        </div>

        <div style="width:120px;">
            <label>枚数</label>
            <input id="count" type="number" min="1" max="4" value="1">
        </div>

        <button id="generate-btn">画像を生成</button>
    </div>

    <div id="gallery"></div>
</main>

<!-- 設定モーダル -->
<div id="settings-modal">
    <div class="modal-content">
        <h2>API 設定</h2>
        <label>Gemini API Key</label>
        <input id="api-key" type="password" placeholder="sk-xxxx">

        <div class="footer">
            <button id="cancel-btn">キャンセル</button>
            <button id="save-key-btn">保存</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
/* ===========================
   DOM
=========================== */
const settingsBtn = document.getElementById("settings-btn");
const settingsModal = document.getElementById("settings-modal");
const cancelBtn = document.getElementById("cancel-btn");
const saveKeyBtn = document.getElementById("save-key-btn");
const apiKeyField = document.getElementById("api-key");

const promptField = document.getElementById("prompt");
const sizeField = document.getElementById("size");
const countField = document.getElementById("count");
const generateBtn = document.getElementById("generate-btn");
const gallery = document.getElementById("gallery");

const toast = document.getElementById("toast");

/* ===========================
   初期ロード
=========================== */
window.addEventListener("DOMContentLoaded", () => {
    const savedKey = localStorage.getItem("gemini_api_key");
    if (savedKey) {
        apiKeyField.value = savedKey;
    } else {
        setTimeout(() => openModal(), 600);
    }
});

/* ===========================
   モーダル
=========================== */
function openModal() {
    settingsModal.style.display = "flex";
}
function closeModal() {
    settingsModal.style.display = "none";
}

settingsBtn.addEventListener("click", openModal);
cancelBtn.addEventListener("click", closeModal);

/* ===========================
   APIキー保存
=========================== */
saveKeyBtn.addEventListener("click", () => {
    const key = apiKeyField.value.trim();
    if (key) {
        localStorage.setItem("gemini_api_key", key);
        showToast("APIキーを保存しました");
    } else {
        localStorage.removeItem("gemini_api_key");
        showToast("APIキーを削除しました");
    }
    closeModal();
});

/* ===========================
   トースト
=========================== */
function showToast(text) {
    toast.innerText = text;
    toast.style.display = "block";
    setTimeout(() => toast.style.display = "none", 2500);
}

/* ===========================
   画像生成
=========================== */
generateBtn.addEventListener("click", generateImage);

async function generateImage() {
    const apiKey = localStorage.getItem("gemini_api_key");
    if (!apiKey) {
        showToast("APIキーが未設定です");
        openModal();
        return;
    }

    const prompt = promptField.value.trim();
    if (!prompt) {
        showToast("プロンプトを入力してください");
        return;
    }

    const size = sizeField.value;
    const count = Number(countField.value);

    generateBtn.disabled = true;
    showToast("生成中…");

    const url =
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;

    const body = {
        contents: [
            {
                parts: [
                    {
                        text: `以下のプロンプトで画像を${count}枚生成してください。\nプロンプト: ${prompt}\nサイズ: ${size}`
                    }
                ]
            }
        ],
        generationConfig: {
            responseMimeType: "image/png"
        }
    };

    try {
        const res = await fetch(url, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(body)
        });

        const data = await res.json();

        if (!res.ok) {
            showToast("エラー: " + data.error.message);
            generateBtn.disabled = false;
            return;
        }

        const images = data.candidates.map(c => c.content.parts[0].inlineData.data);

        renderImages(images);
        showToast("生成完了");

    } catch (e) {
        showToast("通信エラー");
    } finally {
        generateBtn.disabled = false;
    }
}

/* ===========================
   ギャラリー表示
=========================== */
function renderImages(list) {
    gallery.innerHTML = "";

    list.forEach((b64, i) => {
        const card = document.createElement("div");
        card.className = "image-card";

        const img = document.createElement("img");
        img.src = `data:image/png;base64,${b64}`;

        const btn = document.createElement("button");
        btn.innerText = "ダウンロード";
        btn.addEventListener("click", () => downloadImage(img.src, i));

        card.appendChild(img);
        card.appendChild(btn);
        gallery.appendChild(card);
    });
}

function downloadImage(src, index) {
    const a = document.createElement("a");
    a.href = src;
    a.download = `gemini_image_${index + 1}.png`;
    a.click();
}
</script>

</body>
</html>
